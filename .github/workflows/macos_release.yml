name: macOS Release Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen

      - name: Install Flutter Dependencies
        working-directory: vesper_flutter
        run: flutter pub get

      - name: Build macOS App
        working-directory: vesper_flutter
        run: flutter build macos --release

      - name: Create DMG
        run: |
          mkdir -p build-dmg
          cp -R vesper_flutter/build/macos/Build/Products/Release/vesper_flutter.app build-dmg/
          hdiutil create -volname "Vesper" -srcfolder build-dmg -ov -format UDZO Vesper.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-dmg
          path: Vesper.dmg
