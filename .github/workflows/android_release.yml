name: Android Release Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen

      - name: Run flutter_rust_bridge_codegen
        run: flutter_rust_bridge_codegen generate --rust-root vesper_core --dart-root vesper_flutter --rust-input vesper_core/src/api.rs

      - name: Build Rust Core for Android
        working-directory: vesper_core
        run: |
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86 -t x86_64 build --release

      - name: Install Flutter Dependencies
        working-directory: vesper_flutter
        run: flutter pub get

      - name: Build Android APK
        working-directory: vesper_flutter
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: vesper_flutter/build/app/outputs/flutter-apk/app-release.apk
