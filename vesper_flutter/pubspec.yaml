name: vesper_flutter
description: A privacy-first, AI-powered voice memo and transcription app.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.11.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Core / FFI
  flutter_rust_bridge: ^2.0.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.0.0
  
  # Storage
  drift: ^2.16.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.21
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Audio
  just_audio: ^0.9.36
  record: ^5.0.4
  
  # UI & Design System
  flex_color_scheme: ^7.3.1
  phosphor_flutter: ^2.1.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  
  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.5
  file_picker: ^8.0.0
  share_plus: ^10.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  drift_dev: ^2.16.0

flutter:
  uses-material-design: true
